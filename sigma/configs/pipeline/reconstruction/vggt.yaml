name: vggt
implementation: sigma.pipeline.reconstruction.vggt_adapter.VGGTOfflineReconstructor
checkpoint: facebook/VGGT-1B
min_confidence: 0.4
device: ${device}
max_frames: 50  # Maximum number of frames to use (current + t-1 + t-2 if exists)
exclude_moving_objects: true   # zero depth/conf inside segmentation mask
use_origin_frames: true        # feed original frames (with car) to VGGT for full depth coverage
visualization: true
